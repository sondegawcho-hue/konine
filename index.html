<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KONINE | The New Era of Art & Style</title>
  <link rel="icon" type="image/jpeg" href="konine.jpg">
  <link rel="apple-touch-icon" href="konine.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&family=Inter:wght@200;300;400&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #070709;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-glow: rgba(201, 168, 76, 0.4);
      --gold-dim: rgba(201, 168, 76, 0.12);
      --border: rgba(255, 255, 255, 0.07);
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.7s var(--ease);
    }

    body.loaded {
      opacity: 1;
    }

    /* ─── AMBIENT ─── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }

    .orb-1 {
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.07), transparent 65%);
      top: -20%;
      left: -15%;
      animation: driftA 20s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.05), transparent 65%);
      bottom: -15%;
      right: -10%;
      animation: driftB 24s ease-in-out infinite alternate;
    }

    @keyframes driftA {
      to {
        transform: translate(5vw, 4vh) scale(1.1);
      }
    }

    @keyframes driftB {
      to {
        transform: translate(-4vw, -3vh) scale(1.08);
      }
    }

    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent);
      opacity: 0;
      z-index: 1000;
      transition: opacity 2s ease 0.6s;
    }

    body.loaded .scan-line {
      opacity: 0.65;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 500;
      height: clamp(64px, 9vh, 96px);
      padding: 0 clamp(24px, 5.5vw, 80px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(7, 7, 9, 0.88) 0%, rgba(7, 7, 9, 0) 100%);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    @media (min-width: 1400px) {
      nav {
        padding: 42px 90px;
        height: 110px;
      }
    }

    .logo {
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .logo img {
      height: clamp(35px, 5vh, 55px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 10px var(--gold-glow));
      transition: filter 0.4s;
    }

    .logo:hover img {
      filter: drop-shadow(0 0 18px var(--gold-glow)) brightness(1.2);
    }

    .logo-fallback {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      letter-spacing: 6px;
      color: var(--gold);
      display: none;
    }

    .nav-links {
      display: flex;
      gap: clamp(28px, 4vw, 56px);
    }

    .nav-links a {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 0.85vw, 0.75rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      position: relative;
      padding-bottom: 4px;
      transition: color 0.4s;
    }

    @media (min-width: 1400px) {
      .nav-links a {
        font-size: 1.15rem;
        letter-spacing: 6px;
      }
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.7s var(--ease);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--gold-light);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      z-index: 600;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--gold);
      transition: 0.5s var(--ease);
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
      background: var(--gold);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
      background: var(--gold);
    }

    .mobile-menu {
      position: fixed;
      inset: 0;
      background: rgba(7, 7, 9, 0.97);
      backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      z-index: 490;
      transform: translateX(100%);
      transition: transform 0.65s var(--ease);
    }

    .mobile-menu.open {
      transform: translateX(0);
    }

    .mobile-menu a {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2rem, 7vw, 3.5rem);
      letter-spacing: 8px;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      transition: color 0.3s, opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }

    .mobile-menu.open a {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-menu.open a:nth-child(1) {
      transition-delay: 0.1s;
    }

    .mobile-menu.open a:nth-child(2) {
      transition-delay: 0.2s;
    }

    .mobile-menu.open a:nth-child(3) {
      transition-delay: 0.3s;
    }

    .mobile-menu a:hover {
      color: var(--gold);
    }

    @media (max-width:768px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ─── BG WORD ─── */
    .bg-word {
      position: fixed;
      z-index: 0;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: clamp(22vw, 30vw, 38vw);
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.022);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.1em;
      animation: bgBreath 18s ease-in-out infinite alternate;
    }

    @keyframes bgBreath {
      from {
        transform: translate(-50%, -50%) scale(0.97);
      }

      to {
        transform: translate(-50%, -50%) scale(1.03);
        letter-spacing: 0.15em;
      }
    }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: clamp(64px, 9vh, 96px);
      overflow: hidden;
    }

    @media (min-width: 1400px) {
      .eyebrow {
        font-size: 1.1rem;
        letter-spacing: 14px;
        margin-bottom: 24px;
      }

      .main-title {
        font-size: 6.5rem;
        letter-spacing: 28px;
        margin-bottom: 40px;
      }

      .ornament {
        margin-top: 30px;
        gap: 24px;
      }

      .orn-line {
        width: 120px;
      }

      .orn-diamond {
        font-size: 0.8rem;
      }

      .foot-copy {
        font-size: 1.1rem;
        letter-spacing: 5px;
      }

      .foot-brand,
      .foot-links a {
        font-size: 1rem;
        letter-spacing: 6px;
      }
    }

    /* ─── HERO HEADER ─── */
    .hero-header {
      text-align: center;
      z-index: 10;
      pointer-events: none;
      margin-bottom: clamp(22px, 5vh, 52px);
      padding: 0 20px;
    }

    @media (min-width: 1024px) {
      .hero-header {
        margin-bottom: clamp(60px, 10vh, 120px);
      }
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.44rem, 1.1vw, 0.58rem);
      letter-spacing: clamp(5px, 1.5vw, 11px);
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 9px;
      opacity: 0;
      transform: translateY(-8px);
      animation: riseIn 1.2s var(--ease) 0.5s forwards;
    }

    .main-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.35rem, 4.8vw, 4.4rem);
      letter-spacing: clamp(4px, 2vw, 20px);
      text-transform: uppercase;
      line-height: 1.05;
      background: linear-gradient(120deg, #fff 0%, var(--gold-light) 35%, var(--gold) 50%, var(--gold-light) 65%, #fff 100%);
      background-size: 280% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      transform: translateY(-14px);
      animation: riseIn 1.4s var(--ease) 0.7s forwards, shimmer 7s linear 2s infinite;
    }

    @keyframes riseIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shimmer {
      to {
        background-position: 280% center;
      }
    }

    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 11px;
      opacity: 0;
      animation: riseIn 1s var(--ease) 1s forwards;
    }

    .orn-line {
      height: 1px;
      width: clamp(26px, 5vw, 70px);
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .orn-line:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .orn-diamond {
      font-size: 0.35rem;
      color: var(--gold);
    }

    /* ─── GALLERY WRAPPER ─── */
    .gallery-section {
      position: relative;
      z-index: 5;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .arrow-btn {
      position: absolute;
      top: 50%;
      z-index: 20;
      transform: translateY(-60%);
      width: clamp(34px, 3.5vw, 46px);
      height: clamp(34px, 3.5vw, 46px);
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: all 0.35s var(--ease);
    }

    .arrow-btn:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 18px var(--gold-glow);
    }

    .arrow-btn.prev {
      left: clamp(6px, 2.5vw, 36px);
    }

    .arrow-btn.next {
      right: clamp(6px, 2.5vw, 36px);
    }

    @media (max-width:480px) {
      .arrow-btn {
        display: none;
      }
    }

    /* ─── 3-D CAROUSEL ─── */
    .carousel-vp {
      width: 100%;
      height: clamp(290px, 46vh, 580px);
      perspective: clamp(800px, 100vw, 2800px);
      perspective-origin: 50% 38%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .carousel-track {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      transition: transform 1.4s var(--ease);
    }

    .card {
      position: absolute;
      top: 0;
      left: 0;
      transform-style: preserve-3d;
      transition: all 1.1s var(--ease);
      cursor: pointer;
    }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      transition: transform 1.1s var(--ease), box-shadow 1.1s var(--ease);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 6px;
      transition: filter 1.2s var(--ease), opacity 1.2s var(--ease);
      will-change: filter, opacity;
      user-select: none;
      -webkit-user-drag: none;
    }

    .card:not(.active) img {
      filter: blur(4px) grayscale(90%) brightness(0.28);
      opacity: 0.32;
    }

    .card:not(.active) .card-img-wrap {
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
      transform: scale(1) translateY(0);
    }

    .card.active img {
      filter: blur(0) grayscale(0) brightness(1.07) contrast(1.03);
      opacity: 1;
    }

    .card.active .card-img-wrap {
      box-shadow:
        0 0 0 1px rgba(201, 168, 76, 0.42),
        0 32px 90px rgba(0, 0, 0, 0.97),
        0 0 55px rgba(201, 168, 76, 0.14);
      transform: scale(1.13) translateY(clamp(-10px, -2.2vh, -26px));
    }

    .card-sheen {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.06) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.8s;
    }

    .card.active .card-sheen {
      opacity: 1;
      animation: sheenMove 6s linear infinite;
    }

    @keyframes sheenMove {
      0% {
        background-position: -200% -200%;
      }

      100% {
        background-position: 200% 200%;
      }
    }

    .card-caption {
      text-align: center;
      margin-top: clamp(26px, 5vh, 48px);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.56rem, 1.25vw, 0.8rem);
      letter-spacing: clamp(3px, 1vw, 6px);
      color: var(--gold);
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s 0.25s, transform 0.7s var(--ease) 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .card.active .card-caption {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── DOTS ─── */
    .dots {
      display: flex;
      gap: 7px;
      justify-content: center;
      align-items: center;
      margin-top: clamp(6px, 1.5vh, 14px);
      z-index: 10;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.18);
      transition: all 0.5s var(--ease);
      cursor: pointer;
      border: none;
      padding: 0;
    }

    .dot.active {
      width: 22px;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold-glow);
    }

    /* ─── FOOTER ─── */
    footer {
      position: relative;
      z-index: 10;
      padding: clamp(10px, 2vh, 20px) clamp(20px, 5vw, 60px);
      border-top: 1px solid var(--border);
      background: linear-gradient(0deg, rgba(7, 7, 9, 0.7), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .foot-brand {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 0.9vw, 0.72rem);
      letter-spacing: 5px;
      color: var(--gold);
      opacity: 0.55;
      text-transform: uppercase;
    }

    .foot-copy {
      font-size: clamp(0.65rem, 1vw, 0.8rem);
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
    }

    .foot-links {
      display: flex;
      gap: 14px;
    }

    .foot-links a {
      font-size: clamp(0.6rem, 0.9vw, 0.72rem);
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .foot-links a:hover {
      color: var(--gold);
    }

    @media (max-width:580px) {

      .foot-brand,
      .foot-links {
        display: none;
      }

      footer {
        justify-content: center;
      }
    }

    /* ─── CURSOR ─── */
    .cursor-orb {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 168, 76, 0.04), transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-9999px, -9999px);
      opacity: 0;
    }

    @media (hover:hover) {
      .cursor-orb {
        opacity: 1;
      }
    }

    /* ─── PAGE CURTAIN ─── */
    .curtain {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .curtain.show {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>

<body>
  <div class="curtain" id="curtain"></div>
  <div class="scan-line"></div>
  <div class="cursor-orb" id="cursorOrb"></div>

  <div class="ambient">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="bg-word">KONINE</div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">
      <img src="konine.jpg" alt="KONINE" id="logoImg">
      <span class="logo-fallback">KONINE</span>
    </a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="team.html">Team</a>
      <a href="contact.html">Contact</a>
      <a href="services.html">Services</a>
    </div>
    <button class="hamburger" id="burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="team.html">Team</a>
    <a href="contact.html">Contact</a>
    <a href="services.html">Services</a>
  </div>

  <!-- MAIN -->
  <main>
    <div class="hero-header">
      <p class="eyebrow">Est. 2026 &nbsp;·&nbsp; Art &amp; Style</p>
      <h1 class="main-title">The New Era of Art &amp; Style</h1>
      <div class="ornament">
        <span class="orn-line"></span>
        <span class="orn-diamond">✦</span>
        <span class="orn-line"></span>
      </div>
    </div>

    <div class="gallery-section">
      <button class="arrow-btn prev" id="prevBtn">&#8592;</button>
      <button class="arrow-btn next" id="nextBtn">&#8594;</button>

      <div class="carousel-vp" id="vp">
        <div class="carousel-track" id="track"></div>
      </div>

      <div class="dots" id="dots"></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="foot-brand">Konine</span>
    <span class="foot-copy">© <span id="yr"></span> KONINE · Art &amp; Style Redefined</span>
    <div class="foot-links">
      <a href="https://instagram.com/konine_company" target="_blank" rel="noopener">IG</a>
      <a href="https://facebook.com/konine" target="_blank" rel="noopener">FB</a>
    </div>
  </footer>

  <script>
    (function () {

      /* ── Image list ── */
      const IMGS = [
        { src: '1.jpeg', label: 'Collection 01' },
        { src: '2_.jpeg', label: 'Collection 02' },
        { src: '3.jpeg', label: 'Collection 03' },
        { src: '4.jpeg', label: 'Collection 04' },
        { src: '5_.jpeg', label: 'Collection 05' },
        { src: '6.jpeg', label: 'Collection 06' },
        { src: '7.jpeg', label: 'Collection 07' },
        { src: '8.jpeg', label: 'Collection 08' },
      ];

      /* ── Responsive sizes ── */
      function getDims() {
        const w = window.innerWidth;
        if (w <= 390) return { cw: 115, ch: 168, r: 196 };
        if (w <= 520) return { cw: 133, ch: 196, r: 228 };
        if (w <= 768) return { cw: 156, ch: 228, r: 268 };
        if (w <= 1024) return { cw: 206, ch: 305, r: 354 };
        if (w <= 1440) return { cw: 262, ch: 390, r: 452 };
        return { cw: 300, ch: 448, r: 520 };
      }

      /* ── Build DOM ── */
      const track = document.getElementById('track');
      const dotsWrap = document.getElementById('dots');
      const N = IMGS.length;
      const ANG = 360 / N;

      IMGS.forEach((img, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.i = i;
        card.innerHTML =
          `<div class="card-img-wrap">
       <img src="${img.src}" alt="${img.label}" draggable="false" loading="lazy">
       <div class="card-sheen"></div>
     </div>
     <div class="card-caption">${img.label}</div>`;
        track.appendChild(card);

        const dot = document.createElement('button');
        dot.className = 'dot';
        dot.setAttribute('aria-label', img.label);
        dotsWrap.appendChild(dot);
      });

      const cards = Array.from(track.querySelectorAll('.card'));
      const dots = Array.from(dotsWrap.querySelectorAll('.dot'));

      /* ── Layout ── */
      let dims = getDims();
      let cur = 0;

      function layout() {
        dims = getDims();
        cards.forEach((card, i) => {
          const wrap = card.querySelector('.card-img-wrap');
          card.style.width = dims.cw + 'px';
          card.style.marginLeft = (-dims.cw / 2) + 'px';
          card.style.marginTop = (-dims.ch / 2) + 'px';
          wrap.style.width = dims.cw + 'px';
          wrap.style.height = dims.ch + 'px';
          card.style.transform =
            `rotateY(${i * ANG}deg) translateZ(${dims.r}px)`;
        });
      }

      /* ── Render ── */
      function render() {
        const rot = -cur * ANG;
        track.style.transform = `rotateY(${rot}deg)`;
        cards.forEach((c, i) => {
          const active = i === ((cur % N) + N) % N;
          c.classList.toggle('active', active);
        });
        dots.forEach((d, i) => {
          const active = i === ((cur % N) + N) % N;
          d.classList.toggle('active', active);
        });
      }

      function goTo(i) { cur = i; render(); }
      function next() { cur++; render(); }
      function prev() { cur--; render(); }

      /* ── Auto-play ── */
      let timer;
      const start = () => { stop(); timer = setInterval(next, 4000); };
      const stop = () => clearInterval(timer);

      /* ── Init ── */
      layout();
      render();
      start();

      /* ── Controls ── */
      document.getElementById('nextBtn').onclick = () => { next(); stop(); start(); };
      document.getElementById('prevBtn').onclick = () => { prev(); stop(); start(); };
      dots.forEach((d, i) => d.addEventListener('click', () => { goTo(i); stop(); start(); }));
      cards.forEach((c, i) => c.addEventListener('click', () => { goTo(i); stop(); start(); }));

      const vp = document.getElementById('vp');
      vp.addEventListener('mouseenter', stop);
      vp.addEventListener('mouseleave', start);

      /* Swipe */
      let tx = 0;
      vp.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
      vp.addEventListener('touchend', e => {
        const d = tx - e.changedTouches[0].clientX;
        if (Math.abs(d) > 38) { d > 0 ? next() : prev(); stop(); start(); }
      }, { passive: true });

      /* Resize */
      let rt;
      window.addEventListener('resize', () => {
        clearTimeout(rt);
        rt = setTimeout(() => { layout(); render(); }, 180);
      });

      /* ── Logo fallback ── */
      const li = document.getElementById('logoImg');
      const lf = document.querySelector('.logo-fallback');
      li.addEventListener('error', () => { li.style.display = 'none'; lf.style.display = 'block'; });

      /* ── Hamburger ── */
      const burger = document.getElementById('burger');
      const mmenu = document.getElementById('mobileMenu');
      burger.addEventListener('click', () => {
        const o = burger.classList.toggle('open');
        mmenu.classList.toggle('open', o);
        document.body.style.overflow = o ? 'hidden' : '';
      });
      mmenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        burger.classList.remove('open');
        mmenu.classList.remove('open');
        document.body.style.overflow = '';
      }));

      /* ── Page transition ── */
      const curtain = document.getElementById('curtain');
      document.querySelectorAll('a[href]').forEach(a => {
        if (a.hostname !== location.hostname) return;
        a.addEventListener('click', e => {
          e.preventDefault();
          const href = a.href;
          curtain.classList.add('show');
          setTimeout(() => { location.href = href; }, 280);
        });
      });

      /* ── Cursor orb ── */
      const orb = document.getElementById('cursorOrb');
      let orbRaf = false;
      window.addEventListener('mousemove', e => {
        if (orbRaf) return;
        orbRaf = true;
        requestAnimationFrame(() => {
          orb.style.transform = `translate(${e.clientX - 140}px, ${e.clientY - 140}px)`;
          orbRaf = false;
        });
      }, { passive: true });

      /* ── Auto year ── */
      document.getElementById('yr').textContent = new Date().getFullYear();

      /* ── Body load ── */
      const ready = () => document.body.classList.add('loaded');
      document.readyState === 'complete' ? ready() : window.addEventListener('load', ready);

    }());
  </script>
</body>

</html>
