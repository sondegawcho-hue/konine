
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | KONINE</title>
    <link rel="icon" type="image/jpeg" href="konine.jpg">
    <link rel="apple-touch-icon" href="konine.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&family=Inter:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-glow: rgba(201, 168, 76, 0.35);
            --white: #ffffff;
            --white-60: rgba(255, 255, 255, 0.60);
            --border: rgba(255, 255, 255, 0.08);
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.7s var(--ease);
            overflow-x: hidden;
        }

        body.loaded {
            opacity: 1;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            transition: opacity 2.5s ease;
        }

        body.loaded .orb {
            opacity: 1;
        }

        .orb-1 {
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.07) 0%, transparent 70%);
            top: -12%;
            left: -8%;
            animation: o1 20s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 42vw;
            height: 42vw;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
            bottom: -8%;
            right: -6%;
            animation: o2 24s ease-in-out infinite alternate;
        }

        @keyframes o1 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(4vw, 3vh) scale(1.12); }
        }

        @keyframes o2 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-3vw, -4vh) scale(1.1); }
        }

        .ambient::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent 100%);
            opacity: 0;
            transition: opacity 2s ease 0.6s;
            z-index: 1000;
        }

        body.loaded .scan-line {
            opacity: 0.7;
        }

        /* Watermark - KONINE on big screens */
        .watermark {
            position: fixed;
            bottom: 30px;
            left: 20px;
            font-family: 'Cinzel', serif;
            font-weight: 800;
            font-size: clamp(1.2rem, 2.5vw, 2rem);
            letter-spacing: 8px;
            color: rgba(201, 168, 76, 0.15);
            pointer-events: none;
            z-index: 50;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(-90deg);
            transform-origin: left bottom;
            bottom: 80px;
            left: 12px;
        }

        @media (max-width: 900px) {
            .watermark {
                display: none;
            }
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 500;
            padding: 0 clamp(24px, 5vw, 72px);
            height: clamp(60px, 8vh, 86px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0) 100%);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 1400px) {
            nav {
                padding: 42px 90px;
                height: 110px;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: clamp(35px, 5vh, 55px);
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 8px var(--gold-glow));
            transition: filter .4s var(--ease);
        }

        .logo:hover img {
            filter: drop-shadow(0 0 18px var(--gold-glow)) brightness(1.15);
        }

        .logo-text {
            font-family: 'Cinzel', serif;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--gold);
            text-transform: uppercase;
            display: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(26px, 4vw, 50px);
        }

        .nav-links a {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--white-60);
            text-decoration: none;
            position: relative;
            padding-bottom: 4px;
            transition: color .35s var(--ease);
        }

        @media (min-width: 1400px) {
            .nav-links a {
                font-size: 1.12rem;
                letter-spacing: 6px;
            }
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            box-shadow: 0 0 6px var(--gold-glow);
            transition: width .7s var(--ease);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--gold-light);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 600;
            padding: 8px;
            background: none;
            border: none;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 1.5px;
            background: var(--gold);
            transition: .7s var(--ease);
        }

        .hamburger.open span:nth-child(1) {
            transform: translateY(6.5px) rotate(45deg);
        }
        .hamburger.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger.open span:nth-child(3) {
            transform: translateY(-6.5px) rotate(-45deg);
        }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(28px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 490;
            transform: translateX(100%);
            transition: transform .7s var(--ease);
        }

        .mobile-menu.open {
            transform: translateX(0);
        }

        .mobile-menu a {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(2rem, 6vw, 3rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--white);
            text-decoration: none;
            opacity: 0;
            transform: translateY(22px);
            transition: color .3s, opacity .5s var(--ease), transform .5s var(--ease);
        }

        .mobile-menu.open a {
            opacity: 1;
            transform: translateY(0);
        }
        .mobile-menu.open a:nth-child(2) { transition-delay: .1s; }
        .mobile-menu.open a:nth-child(3) { transition-delay: .2s; }
        .mobile-menu.open a:nth-child(4) { transition-delay: .3s; }
        .mobile-menu.open a:nth-child(5) { transition-delay: .4s; }

        .mobile-menu a:hover {
            color: var(--gold);
        }

        .mm-rule {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 14px 0;
            opacity: 0;
            transition: opacity .5s;
        }
        .mobile-menu.open .mm-rule { opacity: 1; }

        @media(max-width:768px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
        }

        .curtain {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity .6s ease;
        }
        .curtain.on {
            opacity: 1;
            pointer-events: all;
        }

        .cursor-glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.045) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-9999px, -9999px);
            opacity: 0;
        }
        @media(hover:hover) { .cursor-glow { opacity: 1; } }

        /* Main content */
        main {
            flex: 1;
            position: relative;
            z-index: 1;
            padding-top: clamp(60px, 8vh, 86px);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contact Layout - Two Column */
        .contact-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(40px, 6vh, 80px) clamp(24px, 6vw, 80px);
            display: flex;
            align-items: center;
            gap: clamp(50px, 8vw, 100px);
        }

        /* Left Side - Decorative with Typing Effect (lowercase) */
        .contact-left {
            flex: 1;
            max-width: 480px;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideInLeft 0.9s var(--ease) 0.3s forwards;
        }

        @keyframes slideInLeft {
            to { opacity: 1; transform: translateX(0); }
        }

        .contact-eyebrow {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.55rem, 0.9vw, 0.7rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .contact-headline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(3rem, 7vw, 6rem);
            line-height: 0.92;
            letter-spacing: clamp(6px, 1.5vw, 18px);
            text-transform: uppercase;
            background: linear-gradient(145deg, #ffffff, var(--gold-light) 35%, var(--gold) 65%, #f5e2a4);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes textShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Typing Container - LOWERCASE letters - FIXED VISIBILITY */
        .typing-container {
            margin: 20px 0 24px;
            width: 100%;
            display: block;
        }
        .typing-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.1rem, 1.8vw, 1.45rem);
            letter-spacing: 2px;
            color: var(--gold-light);
            border-left: 2px solid var(--gold);
            padding-left: 20px;
            min-height: 4rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            font-weight: 400;
            font-style: italic;
            background: transparent;
            line-height: 1.5;
        }
        #typedPhrase {
            display: inline-block;
            color: var(--gold-light);
            font-weight: 500;
            text-shadow: 0 0 2px rgba(201, 168, 76, 0.3);
        }
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.3em;
            background-color: var(--gold);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .contact-ornament {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 30px;
        }
        .ornament-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
        }
        .ornament-dot {
            color: var(--gold);
            font-size: 0.7rem;
        }

        /* Right Side - Contact Card (DARK INTERIOR - pure black card background) */
        .contact-card {
            flex: 1;
            max-width: 520px;
            background: #0a0a0a;
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: clamp(32px, 4.5vw, 48px);
            border: 1px solid rgba(219, 180, 92, 0.4);
            box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(219, 180, 92, 0.15) inset;
            transition: all 0.45s cubic-bezier(0.2, 0.95, 0.4, 1);
            animation: cardGlow 4s infinite alternate ease-in-out;
            opacity: 0;
            transform: translateX(30px);
            animation: slideInRight 0.9s var(--ease) 0.4s forwards, cardGlow 4s infinite alternate ease-in-out;
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes cardGlow {
            0% {
                border-color: rgba(219, 180, 92, 0.35);
                box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(219, 180, 92, 0.12) inset;
            }
            100% {
                border-color: rgba(219, 180, 92, 0.7);
                box-shadow: 0 40px 75px -18px rgba(0, 0, 0, 1), 0 0 0 2px rgba(219, 180, 92, 0.4) inset;
            }
        }

        .contact-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 50px 85px -20px rgba(0, 0, 0, 1), 0 0 0 2px rgba(219, 180, 92, 0.6) inset;
        }

        /* No "Private Studio" text - removed header area */
        .card-header {
            display: none;
        }

        /* Simple elegant divider at top */
        .card-top-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            margin-bottom: 28px;
        }

        .divider-gold {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
            margin: 22px 0 24px;
        }

        /* Contact Items */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(219, 180, 92, 0.15);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
        }
        .contact-item:last-child {
            border-bottom: none;
        }

        .item-icon {
            width: 52px;
            height: 52px;
            background: rgba(30, 30, 35, 0.8);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(219, 180, 92, 0.45);
            transition: all 0.4s;
            flex-shrink: 0;
        }
        .item-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--gold);
            transition: all 0.3s;
        }
        .contact-item:hover .item-icon {
            background: rgba(219, 180, 92, 0.2);
            border-color: var(--gold-light);
            transform: scale(1.05);
            box-shadow: 0 0 16px rgba(219, 180, 92, 0.35);
        }
        .contact-item:hover .item-icon svg {
            fill: var(--gold-light);
        }

        .item-info {
            flex: 1;
        }
        .item-label {
            font-family: 'Cinzel', serif;
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
            display: block;
            opacity: 0.8;
        }
        .item-value {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            color: #f0ece5;
            transition: color 0.3s;
            letter-spacing: 0.3px;
        }
        .contact-item:hover .item-value {
            color: var(--gold-light);
        }

        .item-arrow {
            color: var(--gold);
            font-size: 1.1rem;
            transition: transform 0.4s, color 0.3s;
            opacity: 0.6;
        }
        .contact-item:hover .item-arrow {
            transform: translateX(8px);
            color: var(--gold-light);
            opacity: 1;
        }

        /* CEO badge subtle */
        .ceo-badge {
            font-size: 0.5rem;
            letter-spacing: 2px;
            color: rgba(219, 180, 92, 0.55);
            margin-left: 8px;
            font-family: 'Cinzel', serif;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .contact-container {
                flex-direction: column;
                gap: 50px;
                padding: 40px 24px;
            }
            .contact-left {
                text-align: center;
                max-width: 100%;
            }
            .typing-text {
                border-left: none;
                border-top: 1px solid var(--gold);
                border-bottom: 1px solid rgba(219, 180, 92, 0.4);
                padding: 12px 0;
                justify-content: center;
                text-align: center;
            }
            .contact-ornament {
                justify-content: center;
            }
            .contact-card {
                max-width: 100%;
                width: 100%;
            }
        }

        /* Extra fix for very large screens to ensure visibility */
        @media (min-width: 1400px) {
            .typing-text {
                font-size: 1.5rem;
                padding-left: 28px;
            }
            #typedPhrase {
                font-size: 1.5rem;
            }
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 10;
            padding: clamp(10px, 2vh, 22px) clamp(24px, 5vw, 60px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
        }
        .footer-brand {
            font-family: 'Cinzel', serif;
            font-size: clamp(.52rem, .9vw, .65rem);
            letter-spacing: 5px;
            color: var(--gold);
            opacity: .6;
            text-transform: uppercase;
        }
        .footer-copy {
            font-size: clamp(.58rem, .95vw, .72rem);
            letter-spacing: 3px;
            color: var(--white-60);
            opacity: .5;
        }
        .footer-year {
            font-size: clamp(.52rem, .9vw, .65rem);
            letter-spacing: 3px;
            color: var(--white-60);
            opacity: .35;
            text-transform: uppercase;
        }

        @media(max-width:580px) {
            footer {
                justify-content: center;
                flex-wrap: wrap;
                gap: 6px;
            }
            .footer-brand, .footer-year { display: none; }
        }
    </style>
</head>
<body>
    <div class="curtain" id="curtain"></div>
    <div class="scan-line"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Watermark - KONINE on big screens -->
    <div class="watermark">KONINE</div>

    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- NAV -->
    <nav>
        <a href="index.html" class="logo">
            <img src="konine.jpg" alt="KONINE" id="logoImg">
            <span class="logo-text">KONINE</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="team.html">Team</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
        <button class="hamburger" id="burger" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <div class="mm-rule"></div>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="team.html">Team</a>
        <a href="contact.html">Contact</a>
        <div class="mm-rule"></div>
    </div>

    <main>
        <div class="contact-container">
            <!-- Left Decorative Side with Typing Effect (lowercase letters) - VISIBLE ON ALL SCREENS -->
            <div class="contact-left">
                <div class="contact-eyebrow">✦ REACH OUT ✦</div>
                <h1 class="contact-headline">Connect<br>With Us</h1>
                
                <!-- Typing Animation: lowercase phrases - FIXED VISIBILITY -->
                <div class="typing-container">
                    <div class="typing-text">
                        <span id="typedPhrase"></span>
                        <span class="typing-cursor"></span>
                    </div>
                </div>
                
                <div class="contact-ornament">
                    <div class="ornament-line"></div>
                    <span class="ornament-dot">✧</span>
                    <div class="ornament-line" style="transform: rotate(180deg);"></div>
                </div>
            </div>

            <!-- Contact Card - DARK INTERIOR (black background), no "private studio" text -->
            <div class="contact-card">
                <!-- Simple gold accent line instead of header -->
                <div class="card-top-divider"></div>

                <!-- CEO Phone Number -->
                <a href="tel:+255616334055" class="contact-item" id="phoneItem">
                    <div class="item-icon">
                        <svg viewBox="0 0 24 24">
